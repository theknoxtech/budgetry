{% extends "base.html" %}
{% block title %} - Register{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="card auth-card">
        <h2>Create Account</h2>
        <p class="auth-subtitle">Get started with Budgetry</p>

        <form method="POST" action="{{ url_for('main.register') }}">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Username" required>
            <label for="email">Email (optional)</label>
            <input type="email" id="email" name="email" placeholder="Email">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="At least 8 characters" required minlength="8">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm password" required>
            <button type="submit" class="auth-btn">Create Account</button>
        </form>

        <p style="text-align: center; margin-top: 1rem; font-size: 0.85rem; color: var(--text-secondary);">
            Already have an account? <a href="{{ url_for('main.login') }}">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
