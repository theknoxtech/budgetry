{% extends "base.html" %}
{% block title %} - Set Target{% endblock %}

{% block content %}
<h2>Set Target for "{{ category.name }}"</h2>

<div class="card">
    <form method="POST" action="{{ url_for('main.set_target', category_id=category.id) }}">
        <label for="target-type">Target Type</label>
        <select id="target-type" name="target_type">
            <option value="" {% if not category.target_type %}selected{% endif %}>None</option>
            <option value="weekly" {% if category.target_type == 'weekly' %}selected{% endif %}>Weekly</option>
            <option value="biweekly" {% if category.target_type == 'biweekly' %}selected{% endif %}>Biweekly</option>
            <option value="monthly" {% if category.target_type == 'monthly' %}selected{% endif %}>Monthly</option>
            <option value="yearly" {% if category.target_type == 'yearly' %}selected{% endif %}>Yearly</option>
            <option value="custom" {% if category.target_type == 'custom' %}selected{% endif %}>Custom (by date)</option>
        </select>

        <label for="target-amount">Target Amount ($)</label>
        <input type="number" id="target-amount" name="target_amount" value="{{ '%.2f'|format(category.target_amount) }}" step="0.01" min="0">

        <div id="target-date-group" class="{{ 'hidden' if category.target_type != 'custom' else '' }}">
            <label for="target-date">Target Date</label>
            <input type="date" id="target-date" name="target_date" value="{{ category.target_date }}">
        </div>

        <div class="form-actions">
            <button type="submit">Save Target</button>
            <a href="{{ url_for('main.budget') }}" role="button" class="secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
