{% extends "base.html" %}
{% block title %} - Edit Category{% endblock %}

{% block content %}
<h2>Edit Category</h2>

<div class="card">
<form method="POST" action="{{ url_for('main.edit_category', category_id=category.id) }}">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" value="{{ category.name }}" placeholder="Category name" required>

    <div class="form-actions">
        <button type="submit">Save Changes</button>
        <a href="{{ url_for('main.categories') }}" role="button" class="secondary">Cancel</a>
    </div>
</form>
</div>
{% endblock %}
