{% extends "base.html" %}
{% block title %} - Add Transaction{% endblock %}

{% block content %}
<h2>Add Transaction</h2>

<div class="card">
<form method="POST" action="{{ url_for('main.add_transaction') }}">
    <label for="date">Date</label>
    <input type="date" id="date" name="date" value="{{ today }}" required>

    <label for="payee">Payee</label>
    <select id="payee_select" name="payee_select" onchange="toggleNewField(this, 'new-payee-row', 'new_payee_name')">
        <option value="" disabled selected>Select a payee</option>
        {% for p in payees %}
        <option value="{{ p.name }}">{{ p.name }}</option>
        {% endfor %}
        <option value="__new__">+ New Payee</option>
    </select>
    <div id="new-payee-row" class="inline-create-row" style="display:none;">
        <input type="text" id="new_payee_name" name="new_payee_name" placeholder="New payee name">
    </div>

    <label for="amount">Amount</label>
    <input type="number" id="amount" name="amount" step="0.01" placeholder="0.00" required>

    <label for="account_id">Account</label>
    <select id="account_id" name="account_id" required>
        <option value="" disabled {{ 'selected' if not default_account_id else '' }}>Select an account</option>
        {% for acct in accounts %}
        <option value="{{ acct.id }}" {{ 'selected' if default_account_id == acct.id else '' }}>{{ acct.name }} ({{ acct.institution }})</option>
        {% endfor %}
    </select>

    <label for="category_id">Category</label>
    <select id="category_id" name="category_id" required onchange="toggleNewField(this, 'new-category-row', 'new_category_name')">
        <option value="" disabled {{ 'selected' if not default_category_id else '' }}>Select a category</option>
        {% for cat in categories %}
        <option value="{{ cat.id }}" {{ 'selected' if default_category_id == cat.id else '' }}>{{ cat.name }}</option>
        {% endfor %}
        <option value="__new__">+ New Category</option>
    </select>
    <div id="new-category-row" class="inline-create-row" style="display:none;">
        <input type="text" id="new_category_name" name="new_category_name" placeholder="New category name">
    </div>

    <label for="memo">Memo</label>
    <input type="text" id="memo" name="memo" placeholder="What was this for?">

    <div class="form-actions">
        <button type="submit">Add Transaction</button>
        <a href="{{ url_for('main.transactions') }}" role="button" class="secondary">Cancel</a>
    </div>
</form>
</div>

<script>
function toggleNewField(sel, rowId, inputId) {
    var row = document.getElementById(rowId);
    var inp = document.getElementById(inputId);
    if (sel.value === '__new__') {
        row.style.display = '';
        inp.required = true;
        inp.focus();
    } else {
        row.style.display = 'none';
        inp.required = false;
        inp.value = '';
    }
}
</script>
{% endblock %}
