{% extends "base.html" %}
{% block title %} - Edit Transaction{% endblock %}

{% block content %}
<h2>Edit Transaction</h2>

<div class="card">
<form method="POST" action="{{ url_for('main.edit_transaction', transaction_id=transaction.id) }}">
    <label for="date">Date</label>
    <input type="date" id="date" name="date" value="{{ transaction.date }}" required>

    <label for="payee">Payee</label>
    <select id="payee_select" name="payee_select" onchange="toggleNewField(this, 'new-payee-row', 'new_payee_name')">
        <option value="" disabled>Select a payee</option>
        {% for p in payees %}
        <option value="{{ p.name }}" {% if p.name == transaction.payee %}selected{% endif %}>{{ p.name }}</option>
        {% endfor %}
        <option value="__new__">+ New Payee</option>
    </select>
    <div id="new-payee-row" class="inline-create-row" style="display:none;">
        <input type="text" id="new_payee_name" name="new_payee_name" placeholder="New payee name">
    </div>

    <label for="amount">Amount</label>
    <input type="number" id="amount" name="amount" step="0.01" value="{{ transaction.amount }}" required>

    <label for="account_id">Account</label>
    <select id="account_id" name="account_id" required>
        <option value="" disabled>Select an account</option>
        {% for acct in accounts %}
        <option value="{{ acct.id }}" {% if acct.id == transaction.account_id %}selected{% endif %}>{{ acct.name }} ({{ acct.institution }})</option>
        {% endfor %}
    </select>

    <label for="category_id">Category</label>
    <select id="category_id" name="category_id" required onchange="toggleNewField(this, 'new-category-row', 'new_category_name')">
        <option value="" disabled>Select a category</option>
        {% for cat in categories %}
        <option value="{{ cat.id }}" {% if cat.id == transaction.category_id %}selected{% endif %}>{{ cat.name }}</option>
        {% endfor %}
        <option value="__new__">+ New Category</option>
    </select>
    <div id="new-category-row" class="inline-create-row" style="display:none;">
        <input type="text" id="new_category_name" name="new_category_name" placeholder="New category name">
    </div>

    <label for="memo">Memo</label>
    <input type="text" id="memo" name="memo" value="{{ transaction.memo }}" placeholder="What was this for?">

    <div class="form-actions">
        <button type="submit">Save Changes</button>
        <a href="{{ url_for('main.transactions') }}" role="button" class="secondary">Cancel</a>
    </div>
</form>
</div>

<script>
function toggleNewField(sel, rowId, inputId) {
    var row = document.getElementById(rowId);
    var inp = document.getElementById(inputId);
    if (sel.value === '__new__') {
        row.style.display = '';
        inp.required = true;
        inp.focus();
    } else {
        row.style.display = 'none';
        inp.required = false;
        inp.value = '';
    }
}
</script>
{% endblock %}
