{% extends "base.html" %}
{% block title %} - Login{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="card auth-card">
        <h2>Welcome to Budgetry</h2>
        <p class="auth-subtitle">Sign in to manage your budget</p>

        <a href="{{ url_for('main.auth_login') }}" role="button" class="auth-btn">Sign In</a>
        <a href="{{ url_for('main.signup') }}" role="button" class="auth-btn outline">Create Account</a>
    </div>
</div>
{% endblock %}
