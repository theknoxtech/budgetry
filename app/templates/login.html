{% extends "base.html" %}
{% block title %} - Login{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="card auth-card">
        <h2>Welcome to Budgetry</h2>
        <p class="auth-subtitle">Sign in to manage your budget</p>

        {% if auth0_enabled %}
        <a href="{{ url_for('main.auth_login') }}" role="button" class="auth-btn">Sign In with Auth0</a>
        <div style="text-align: center; margin: 1rem 0; color: var(--text-secondary); font-size: 0.85rem;">&mdash; or &mdash;</div>
        {% endif %}

        <form method="POST" action="{{ url_for('main.local_login') }}">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Username" required>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Password" required>
            <button type="submit" class="auth-btn">Sign In</button>
        </form>

        <p style="text-align: center; margin-top: 1rem; font-size: 0.85rem; color: var(--text-secondary);">
            Don't have an account? <a href="{{ url_for('main.register') }}">Create one</a>
        </p>
    </div>
</div>
{% endblock %}
